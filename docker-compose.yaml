name: marlin

services:
  postgres:
    container_name: postgres
    image: postgres:17-alpine
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DATABASE_NAME}
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  django:
    container_name: django
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      DJANGO_DEBUG: "False"
      DATABASE_HOST: postgres
      CACHE_LOCATION: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      RATELIMIT_CACHE_LOCATION: redis://redis:6379/2
    expose:
      - "8000"
    volumes:
      - ./staticfiles:/app/staticfiles
      - ./media:/app/media
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate &&
             python -Xutf8 manage.py load_fixtures &&
             python -Xutf8 manage.py compilemessages --locale=ru --ignore=.venv &&
             python manage.py collectstatic --noinput &&
             python manage.py compress --force &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "from urllib.request import urlopen; urlopen('http://127.0.0.1:8000/', timeout=5)",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  redis:
    container_name: redis
    image: redis:7-alpine
    volumes:
      - ./redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  celery:
    container_name: celery
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      DJANGO_DEBUG: "False"
      DATABASE_HOST: postgres
      CACHE_LOCATION: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      RATELIMIT_CACHE_LOCATION: redis://redis:6379/2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A config worker --loglevel=info
    restart: unless-stopped

  flower:
    container_name: flower
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      DJANGO_DEBUG: "False"
      DATABASE_HOST: postgres
      CACHE_LOCATION: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      RATELIMIT_CACHE_LOCATION: redis://redis:6379/2
    depends_on:
      redis:
        condition: service_healthy
      celery:
        condition: service_started
    command: celery -A config flower --port=5555
    ports:
      - "127.0.0.1:5555:5555"
    restart: unless-stopped

  nginx:
    container_name: nginx
    image: nginx:1.28-alpine
    volumes:
      - ${NGINX_CONFIG:-./nginx/http.conf}:/etc/nginx/conf.d/default.conf:ro
      - ./staticfiles:/var/www/static:ro
      - ./media:/var/www/media:ro
      - ./certbot/etc:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      django:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    restart: unless-stopped

  certbot:
    container_name: certbot
    image: certbot/certbot:latest
    volumes:
      - ./certbot/etc:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    profiles:
      - tools
