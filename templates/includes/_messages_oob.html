<div id="messages-container" hx-swap-oob="true">
	{% if messages %}
		<section class="pointer-events-none flex flex-col gap-2 w-full max-w-100 fixed top-30 right-5 max-md:top-5 max-md:right-0 max-md:px-4 max-md:max-w-full z-10">
		  {% for message in messages %}
		    <article class="message relative transition duration-300 opacity-0 translate-x-[120%] ease-in-out cursor-pointer rounded-box bg-surface-dim p-4">
	        <p class="text-sm flex items-center text-{{ message.tags }} gap-2">
	          {% if message.tags == "success" %}
		          <svg class="stroke-current shrink-0 size-6" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
		        {% elif message.tags == "error" %}
		          <svg class="stroke-current shrink-0 size-6" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
		        {% elif message.tags == "warning" %}
		          <svg class="stroke-current shrink-0 size-6" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
		        {% elif message.tags == "info" %}
		          <svg class="stroke-current shrink-0 size-6" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
		        {% endif %}

		        {{ message }}
	        </p>
		    </article>
		  {% endfor %}
		</section>
	{% endif %}
</div>
